      <tspan fill="#5fafff">[FABLE5]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#87d787">[CTX 26%]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#ffd700">[5H 71%→17:30]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#87d787">[7D 46%→14 Jul]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#87d787">[BDG 0.7×·high]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#ffaf87">[XF CODEX×2]</tspan><tspan fill="#8b949e"> </tspan><tspan fill="#d7afff">[DLG SONNET-5 41k]</tspan>
    </text>
